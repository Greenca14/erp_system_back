networks:
  redisNetwork:
    driver: bridge
  nginxNetwork:
    driver: bridge

services:
  redis:
    build: ./docker/redis
    restart: unless-stopped
    volumes:
      - ./docker/redis/redis.conf:/usr/local/etc/redis/redis.conf
    environment:
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
    ports:
      - "6379:6379"
    networks:
      - redisNetwork
    container_name: erp_redis

  api:
    build: .
    volumes:
      - .:/app
    environment:
      - REDIS_USER=${REDIS_USER}
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - DJANGO_SECRET_KEY=${DJANGO_SECRET_KEY}
    ports:
      - "8000:8000"
    networks:
      - redisNetwork
      - nginxNetwork
    container_name: erp_backend
  
  nginx:
    image: nginx:latest
    restart: always
    depends_on:
      - api
    ports:
      - "80:80"
      - "443:443"
    networks:
      - nginxNetwork
    volumes:
      - /var/www/erp_system_front/dist:/usr/share/nginx/html
      - ./docker/nginx/nginx.conf:/etc/nginx/conf.d/default.conf
      - ./docker/nginx/cert:/etc/letsencrypt/live/labzavr.ru
    container_name: erp_nginx
